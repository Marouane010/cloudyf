name: oidc-test
on:
  workflow_dispatch:

permissions:
  id-token: write   # requis pour demander le token OIDC
  contents: read

jobs:
  prove-oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Azure login via OIDC (zero secret)
        uses: azure/login@v2
        with:
          client-id: ab531174-9ece-4700-842b-28f459c7a701
          tenant-id: 413600cf-bd4e-4c7c-8a61-69e73cddf731
          allow-no-subscriptions: true

      - name: Prove authenticated identity
        run: az account list --all -o table && echo "=== OIDC federation OK, identity authenticated, zero RBAC, zero secret ==="
