name: secure-pipeline
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write   # requis pour pousser sur GHCR

env:
  IMAGE: ghcr.io/marouane010/cloudyf   # GHCR exige la casse minuscule

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: scan-build-push   # jamais de deploy si un scan a échoué
    steps:
      - uses: actions/checkout@v4

      - name: Azure login via OIDC (subscription visible depuis le rôle)
        uses: azure/login@v2
        with:
          client-id: ab531174-9ece-4700-842b-28f459c7a701
          tenant-id: 413600cf-bd4e-4c7c-8a61-69e73cddf731
          subscription-id: 13df671f-a63d-4845-a227-e5ddf2035839

      - name: Get AKS credentials
        run: az aks get-credentials -g rg-seclab-aks -n aks-seclab

      - name: Inject image tag (SHA du commit courant)
        run: sed -i "s|IMAGE_TAG|${{ github.sha }}|" k8s/seclab-k8s.yaml

      - name: Deploy
        run: |
          kubectl apply -f k8s/
          kubectl rollout status deployment/nginx -n app --timeout=180s
  scan-build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -t ${{ env.IMAGE }}:${{ github.sha }} .

      - name: Vulnerability scan (Trivy) — bloquant si CRITICAL
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      - name: Login GHCR (token éphémère du run)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push (uniquement si les scans sont verts)
        run: docker push ${{ env.IMAGE }}:${{ github.sha }}
  
